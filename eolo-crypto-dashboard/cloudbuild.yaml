# ============================================================
#  EOLO Crypto Dashboard — Cloud Build Pipeline
#
#  Deploy manual:
#    gcloud builds submit \
#      --config eolo-crypto-dashboard/cloudbuild.yaml \
#      --project eolo-schwab-agent \
#      eolo-crypto-dashboard/
#
#  Región: us-central1 (el dashboard NO pega a Binance,
#  solo lee Firestore, así que no necesitamos región no-US
#  como el bot. Firestore es regional al proyecto.)
# ============================================================

steps:
  # ── Build ──────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eolo-crypto-dashboard:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eolo-crypto-dashboard:latest'
      - '.'

  # ── Push ───────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/eolo-crypto-dashboard:latest'

  # ── Deploy a Cloud Run ─────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'eolo-crypto-dashboard'
      - '--image=gcr.io/$PROJECT_ID/eolo-crypto-dashboard:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

images:
  - 'gcr.io/$PROJECT_ID/eolo-crypto-dashboard:latest'

timeout: '600s'

options:
  logging: CLOUD_LOGGING_ONLY
