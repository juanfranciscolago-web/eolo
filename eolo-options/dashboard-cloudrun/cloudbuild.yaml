# ============================================================
#  EOLO v2 Dashboard — Cloud Build Pipeline
#
#  Deploy manual:
#    gcloud builds submit \
#      --config eolo-options/dashboard-cloudrun/cloudbuild.yaml \
#      --project eolo-schwab-agent \
#      eolo-options/dashboard-cloudrun/
# ============================================================

steps:
  # ── Build ──────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eolo-options-dashboard:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eolo-options-dashboard:latest'
      - '.'

  # ── Push ───────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/eolo-options-dashboard:latest'

  # ── Deploy a Cloud Run ─────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'eolo-options-dashboard'
      - '--image=gcr.io/$PROJECT_ID/eolo-options-dashboard:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

images:
  - 'gcr.io/$PROJECT_ID/eolo-options-dashboard:latest'

timeout: '600s'

options:
  logging: CLOUD_LOGGING_ONLY
