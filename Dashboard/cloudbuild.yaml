# ============================================================
#  EOLO Dashboard — Cloud Build Pipeline
#
#  Triggered daily at 9:00 AM ET via Cloud Scheduler.
#  Builds y deploya el dashboard a Cloud Run.
#
#  Manual trigger:
#    gcloud builds submit --config Dashboard/cloudbuild.yaml Dashboard/
# ============================================================

steps:
  # ── Step 1: Build ───────────────────────────────────────
  # Submit con:
  #   gcloud builds submit --config Dashboard/cloudbuild.yaml Dashboard/
  # (submit dir = Dashboard/, así que el contexto del build YA son los
  # archivos del dashboard; por eso no va `dir:` acá).
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eolo-dashboard:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/eolo-dashboard:latest'
      - '.'

  # ── Step 2: Push ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/eolo-dashboard:latest'

  # ── Step 3: Deploy ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'eolo-dashboard'
      - '--image=gcr.io/$PROJECT_ID/eolo-dashboard:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

images:
  - 'gcr.io/$PROJECT_ID/eolo-dashboard:latest'

timeout: '600s'

options:
  logging: CLOUD_LOGGING_ONLY
