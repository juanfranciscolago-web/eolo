<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" font-family="Arial, sans-serif" font-size="12">
  <defs>
    <pattern id="gridV" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="380" fill="#fafafa"/>
  <rect x="40" y="40" width="520" height="240" fill="url(#gridV)"/>

  <!-- Axes -->
  <line x1="40" y1="280" x2="560" y2="280" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="40" x2="40" y2="280" stroke="#333" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="35" y="70" text-anchor="end" font-size="10" fill="#666">20%</text>
  <text x="35" y="120" text-anchor="end" font-size="10" fill="#666">15%</text>
  <text x="35" y="170" text-anchor="end" font-size="10" fill="#666">10%</text>
  <text x="35" y="220" text-anchor="end" font-size="10" fill="#666">5%</text>
  <text x="35" y="270" text-anchor="end" font-size="10" fill="#666">0%</text>

  <!-- IV line (yellow) -->
  <path d="M 80,80 L 140,85 L 200,90 L 260,82 L 320,88 L 380,92 L 440,86 L 500,90"
        stroke="#ffc107" stroke-width="3" fill="none"/>
  <circle cx="500" cy="90" r="4" fill="#ffc107"/>
  <text x="510" y="93" font-size="11" fill="#ffc107" font-weight="bold">IV 14.5%</text>

  <!-- ARV line (purple) -->
  <path d="M 80,220 L 140,210 L 200,205 L 260,200 L 320,195 L 380,210 L 440,215 L 500,212"
        stroke="#9c27b0" stroke-width="3" fill="none"/>
  <circle cx="500" cy="212" r="4" fill="#9c27b0"/>
  <text x="510" y="215" font-size="11" fill="#9c27b0" font-weight="bold">ARV 6.8%</text>

  <!-- VRP shaded gap -->
  <path d="M 80,80 L 500,90 L 500,212 L 80,220 Z" fill="#4caf50" opacity="0.15"/>
  <text x="300" y="160" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">VRP RICH (~7.7pp gap)</text>
  <text x="300" y="178" text-anchor="middle" font-size="11" fill="#2e7d32">Buenas condiciones para vender opciones</text>

  <!-- Time axis -->
  <text x="80" y="300" text-anchor="middle" font-size="10" fill="#666">9:30</text>
  <text x="200" y="300" text-anchor="middle" font-size="10" fill="#666">11:00</text>
  <text x="320" y="300" text-anchor="middle" font-size="10" fill="#666">13:00</text>
  <text x="440" y="300" text-anchor="middle" font-size="10" fill="#666">15:00</text>

  <!-- Title + legend -->
  <text x="300" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">VRP (Volatility Risk Premium) — IV vs ARV</text>

  <!-- Bottom legend with cases -->
  <text x="40" y="335" font-size="11" font-weight="bold" fill="#2e7d32">VRP RICH (gap amplio):</text>
  <text x="40" y="350" font-size="10" fill="#666">IV alta vs RV → vendés caro lo que será barato. Setup ideal.</text>
  <text x="320" y="335" font-size="11" font-weight="bold" fill="#d32f2f">VRP CHEAP (gap chico/negativo):</text>
  <text x="320" y="350" font-size="10" fill="#666">IV barata vs RV → riesgo de vender barato. Cuidado.</text>
</svg>
