<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Arial, sans-serif" font-size="12">
  <rect width="600" height="400" fill="#fafafa"/>

  <!-- Axes -->
  <line x1="40" y1="320" x2="560" y2="320" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="40" x2="40" y2="320" stroke="#333" stroke-width="1.5"/>

  <!-- Opening Range box (9:30-9:36) -->
  <rect x="50" y="180" width="80" height="60" fill="#bbdefb" opacity="0.5" stroke="#1976d2" stroke-width="2"/>
  <text x="90" y="170" text-anchor="middle" font-size="10" font-weight="bold" fill="#1976d2">OR (9:30-9:36)</text>

  <!-- ORH / ORL / OR_mid lines extended -->
  <line x1="130" y1="180" x2="560" y2="180" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="555" y="175" text-anchor="end" font-size="10" font-weight="bold" fill="#4caf50">ORH</text>

  <line x1="130" y1="210" x2="560" y2="210" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="555" y="206" text-anchor="end" font-size="10" font-weight="bold" fill="#ff9800">OR_mid</text>

  <line x1="130" y1="240" x2="560" y2="240" stroke="#f44336" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="555" y="236" text-anchor="end" font-size="10" font-weight="bold" fill="#f44336">ORL</text>

  <!-- Fibonacci extensions -->
  <line x1="130" y1="120" x2="560" y2="120" stroke="#9c27b0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="555" y="116" text-anchor="end" font-size="9" fill="#9c27b0">+1.618 Fib</text>

  <line x1="130" y1="80" x2="560" y2="80" stroke="#9c27b0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="555" y="76" text-anchor="end" font-size="9" fill="#9c27b0">+2.618 Fib</text>

  <line x1="130" y1="290" x2="560" y2="290" stroke="#9c27b0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="555" y="305" text-anchor="end" font-size="9" fill="#9c27b0">-1.618 Fib</text>

  <!-- Price action -->
  <path d="M 50,225 L 70,200 L 90,210 L 110,190 L 130,200 L 160,215 L 190,225 L 220,205 L 250,170 L 280,150 L 310,165 L 340,140 L 370,115 L 400,125 L 430,110 L 460,118 L 490,108 L 520,115"
        stroke="#2196f3" stroke-width="2.5" fill="none"/>

  <!-- Markers -->
  <circle cx="50" cy="225" r="4" fill="#2196f3"/>
  <text x="50" y="335" text-anchor="middle" font-size="9" fill="#666">9:30</text>

  <circle cx="130" cy="200" r="4" fill="#2196f3"/>
  <text x="130" y="335" text-anchor="middle" font-size="9" fill="#666">9:36</text>

  <text x="220" y="335" text-anchor="middle" font-size="9" fill="#666">10:00</text>
  <text x="340" y="335" text-anchor="middle" font-size="9" fill="#666">11:00</text>
  <text x="460" y="335" text-anchor="middle" font-size="9" fill="#666">13:00</text>
  <text x="520" y="335" text-anchor="middle" font-size="9" fill="#666">15:00</text>

  <!-- Breakout label -->
  <text x="250" y="160" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">BREAKOUT ↑</text>
  <line x1="250" y1="170" x2="280" y2="150" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Opening Range Breakout — SPY</text>
  <text x="300" y="365" text-anchor="middle" font-size="11" fill="#666">Precio rompe ORH a las 10:30 → breakout_up → targets en Fib 1.618 / 2.618</text>
</svg>
