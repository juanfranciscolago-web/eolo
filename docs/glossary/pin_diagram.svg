<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="Arial, sans-serif" font-size="12">
  <defs>
    <pattern id="gridP" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="350" fill="#fafafa"/>
  <rect x="40" y="40" width="520" height="240" fill="url(#gridP)"/>

  <!-- Pin band -->
  <rect x="40" y="140" width="520" height="40" fill="#fff9c4" opacity="0.6"/>
  <line x1="40" y1="160" x2="560" y2="160" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="555" y="155" text-anchor="end" fill="#ff9800" font-weight="bold">Max Pain = $755</text>
  <text x="555" y="178" text-anchor="end" fill="#ff9800" font-size="10">Pin band ±0.3%</text>

  <!-- Axes -->
  <line x1="40" y1="280" x2="560" y2="280" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="40" x2="40" y2="280" stroke="#333" stroke-width="1.5"/>

  <!-- Price path -->
  <path d="M 60,220 L 100,180 L 140,200 L 180,170 L 220,150 L 260,165 L 300,155 L 340,160 L 380,158 L 420,162 L 460,159 L 500,161 L 540,160"
        stroke="#2196f3" stroke-width="2.5" fill="none"/>

  <!-- Open / close markers -->
  <circle cx="60" cy="220" r="5" fill="#4caf50"/>
  <text x="60" y="240" text-anchor="middle" fill="#4caf50" font-size="10" font-weight="bold">OPEN</text>
  <text x="60" y="252" text-anchor="middle" fill="#4caf50" font-size="10">$752</text>

  <circle cx="540" cy="160" r="5" fill="#f44336"/>
  <text x="540" y="200" text-anchor="middle" fill="#f44336" font-size="10" font-weight="bold">CLOSE</text>
  <text x="540" y="212" text-anchor="middle" fill="#f44336" font-size="10">$755 (PIN)</text>

  <!-- Time axis -->
  <text x="60" y="300" text-anchor="middle" font-size="10" fill="#666">9:30</text>
  <text x="200" y="300" text-anchor="middle" font-size="10" fill="#666">12:00</text>
  <text x="340" y="300" text-anchor="middle" font-size="10" fill="#666">14:00</text>
  <text x="540" y="300" text-anchor="middle" font-size="10" fill="#666">16:00</text>

  <!-- Title -->
  <text x="300" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">SPY Pin Day — Precio Imantado a Max Pain</text>
  <text x="300" y="330" text-anchor="middle" font-size="11" fill="#666">El precio oscila durante el día pero se imanta al MVC ($755) al cierre</text>
</svg>
